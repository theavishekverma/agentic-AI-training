<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Student Portal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1c2330;
      --border:     #2d3748;
      --accent:     #3b82f6;
      --accent-dim: #1d3a6e;
      --green:      #22c55e;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --text:       #e2e8f0;
      --muted:      #64748b;
      --font-head:  'Space Grotesk', sans-serif;
      --font-body:  'Inter', sans-serif;
      --radius:     10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-brand {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .sidebar-brand .icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 10px;
    }
    .sidebar-brand h1 {
      font-family: var(--font-head);
      font-size: 15px; font-weight: 700;
      color: var(--text);
    }
    .sidebar-brand p {
      font-size: 11px; color: var(--muted);
    }

    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px; font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text);
      background: var(--surface2);
      border-left-color: var(--accent);
    }
    .nav-link .nav-icon { font-size: 15px; width: 18px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px 0;
      border-top: 1px solid var(--border);
    }
    .api-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }
    .dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

    /* ── Main content ─────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 32px 36px;
      overflow-x: hidden;
    }

    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap; gap: 12px;
    }
    .page-header h2 {
      font-family: var(--font-head);
      font-size: 22px; font-weight: 700;
      color: var(--text);
    }
    .page-header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Cards ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
    }

    /* ── Stat strip ───────────────────────────────────────────────── */
    .stats { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 22px;
      flex: 1; min-width: 130px;
    }
    .stat-value {
      font-family: var(--font-head);
      font-size: 28px; font-weight: 700;
      color: var(--accent);
    }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

    /* ── Alerts ───────────────────────────────────────────────────── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 18px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .alert-error   { background: #2d1212; border: 1px solid #7f1d1d; color: #fca5a5; }
    .alert-success { background: #0d2a1a; border: 1px solid #14532d; color: #86efac; }

    /* ── Search bar ───────────────────────────────────────────────── */
    .search-row {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-row input, .search-row select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 14px;
      border-radius: 8px; font-size: 13px; font-family: var(--font-body);
      outline: none; flex: 1; min-width: 160px;
    }
    .search-row input:focus, .search-row select:focus { border-color: var(--accent); }

    /* ── Table ────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; padding: 10px 14px;
      font-size: 11px; font-weight: 600; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 13px 14px;
      font-size: 13px;
      border-bottom: 1px solid #1e2637;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: 11px; font-weight: 600;
      background: var(--accent-dim); color: #93c5fd;
    }

    .id-pill {
      font-family: monospace; font-size: 12px;
      background: var(--surface2); color: var(--muted);
      padding: 2px 8px; border-radius: 6px;
    }

    .empty-state {
      text-align: center; padding: 52px 0; color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      border: none; transition: opacity .15s, transform .1s;
      font-family: var(--font-body);
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.97); }

    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-ghost     { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger    { background: #7f1d1d; color: #fca5a5; }
    .btn-sm        { padding: 5px 12px; font-size: 12px; }

    /* ── Form ─────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px;
      border-radius: 8px; font-size: 13px; font-family: var(--font-body);
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .required { color: var(--red); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    @media(max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .form-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Action menu in table ─────────────────────────────────────── */
    .actions { display: flex; gap: 6px; }

    /* ── Quick-update modal ───────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 380px; max-width: 95vw;
    }
    .modal h3 {
      font-family: var(--font-head); font-size: 16px;
      margin-bottom: 16px;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="icon">🎓</div>
      <h1>Student Portal</h1>
      <p>FastAPI + Django</p>
    </div>

    <nav>
      <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
        <span class="nav-icon">⊞</span> Dashboard
      </a>
      <a href="/students/add/" class="nav-link {% block nav_add %}{% endblock %}">
        <span class="nav-icon">＋</span> Add Student
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="api-badge" style="margin-bottom:12px;">
        <span class="dot"></span>
        FastAPI :8000
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div style="font-size:12px;color:var(--muted);">
          👤 <span style="color:var(--text);font-weight:600;">{{ request.session.username }}</span>
        </div>
        <a href="/logout/" style="font-size:11px;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:color .15s;"
           onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
          Sign out
        </a>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>

<!-- Quick-update Modal (shared) -->
<div class="modal-overlay" id="quickModal">
  <div class="modal">
    <h3 id="modalTitle">Update field</h3>
    <form method="POST" id="quickForm" action="">
      {% csrf_token %}
      <div class="form-group">
        <label id="modalLabel">New value</label>
        <input type="text" name="value" id="modalInput" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openModal(studentId, field, currentValue, label) {
    document.getElementById('quickForm').action = `/students/${studentId}/quick-update/${field}/`;
    document.getElementById('modalTitle').textContent = `Update ${label}`;
    document.getElementById('modalLabel').textContent = `New ${label}`;
    document.getElementById('modalInput').value = currentValue || '';
    document.getElementById('modalInput').focus();
    document.getElementById('quickModal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('quickModal').classList.remove('open');
  }
  document.getElementById('quickModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Auto-dismiss flash messages
  setTimeout(() => {
    document.querySelectorAll('.alert').forEach(el => {
      el.style.transition = 'opacity .4s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 400);
    });
  }, 4000);
</script>
</body>
</html>
