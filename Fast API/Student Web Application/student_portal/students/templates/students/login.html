<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Student Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2330;
      --border:   #2d3748;
      --accent:   #3b82f6;
      --red:      #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%; max-width: 400px;
      position: relative; z-index: 1;
    }

    /* Brand header */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 14px;
      box-shadow: 0 0 28px rgba(59,130,246,.35);
    }
    .brand h1 {
      font-family: var(--font-head);
      font-size: 22px; font-weight: 700;
      color: var(--text);
    }
    .brand p {
      font-size: 13px; color: var(--muted);
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }
    .card h2 {
      font-family: var(--font-head);
      font-size: 16px; font-weight: 600;
      margin-bottom: 24px;
      color: var(--text);
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 15px; color: var(--muted);
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px 10px 38px;
      border-radius: 8px;
      font-size: 13px; font-family: var(--font-body);
      outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: var(--accent); }

    .alert-error {
      background: #2d1212;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      font-family: var(--font-head);
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      margin-top: 6px;
    }
    .btn-login:hover   { opacity: .88; }
    .btn-login:active  { transform: scale(.98); }

    /* Hint strip */
    .hint-strip {
      margin-top: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px; color: var(--muted);
      line-height: 1.7;
    }
    .hint-strip strong { color: var(--text); font-family: monospace; }

    /* API badge */
    .api-note {
      text-align: center;
      margin-top: 20px;
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="brand">
    <div class="brand-icon">🎓</div>
    <h1>Student Portal</h1>
    <p>FastAPI + Django Management System</p>
  </div>

  <div class="card">
    <h2>Sign in to continue</h2>

    {% if error %}
    <div class="alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            type="text"
            name="username"
            placeholder="Enter username"
            value="{{ request.POST.username|default:'' }}"
            autocomplete="username"
            autofocus
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="hint-strip">
      Default credentials:<br>
      Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong><br>
      Change these in <strong>settings.py</strong> before going live.
    </div>
  </div>

  <div class="api-note">
    <span class="dot"></span>
    Connected to FastAPI on port 8000
  </div>

</div>
</body>
</html>
