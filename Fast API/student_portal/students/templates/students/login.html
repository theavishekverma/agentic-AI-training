<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Student Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2330;
      --border:   #2d3748;
      --accent:   #3b82f6;
      --green:    #22c55e;
      --red:      #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      pointer-events: none;
    }

    .login-wrap { width: 100%; max-width: 400px; position: relative; z-index: 1; }

    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon {
      width: 54px; height: 54px;
      background: var(--accent);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 12px;
      box-shadow: 0 0 28px rgba(59,130,246,.35);
    }
    .brand h1 { font-family: var(--font-head); font-size: 22px; font-weight: 700; }
    .brand p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 30px 32px;
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 16px; font-weight: 600;
      margin-bottom: 22px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .07em;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--muted); pointer-events: none;
    }
    .form-group input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px 10px 38px;
      border-radius: 8px; font-size: 13px; font-family: var(--font-body); outline: none;
      transition: border-color .15s;
    }
    .form-group input:focus { border-color: var(--accent); }

    .alert-error {
      background: #2d1212; border: 1px solid #7f1d1d; color: #fca5a5;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-login {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600;
      font-family: var(--font-head); cursor: pointer;
      transition: opacity .15s, transform .1s; margin-top: 4px;
    }
    .btn-login:hover  { opacity: .88; }
    .btn-login:active { transform: scale(.98); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Register CTA */
    .register-cta {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .register-cta:hover { border-color: var(--accent); background: #1a2535; }
    .register-cta .cta-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent-dim, #1d3a6e);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .register-cta .cta-text strong {
      display: block; font-size: 13px; font-weight: 600; color: var(--text);
      font-family: var(--font-head);
    }
    .register-cta .cta-text span {
      font-size: 11px; color: var(--muted);
    }
    .register-cta .cta-arrow { margin-left: auto; color: var(--muted); font-size: 16px; }

    .hint-strip {
      margin-top: 16px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; font-size: 11px; color: var(--muted); line-height: 1.7;
    }
    .hint-strip strong { color: var(--text); font-family: monospace; }

    .api-note {
      text-align: center; margin-top: 18px; font-size: 11px; color: var(--muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="brand">
    <div class="brand-icon">🎓</div>
    <h1>Student Portal</h1>
    <p>FastAPI + Django Management System</p>
  </div>

  <div class="card">
    <p class="card-title">Sign in to continue</p>

    {% if error %}
    <div class="alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" name="username" placeholder="Enter your username"
                 value="{{ request.POST.username|default:'' }}"
                 autocomplete="username" autofocus required />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" name="password" placeholder="Enter your password"
                 autocomplete="current-password" required />
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="divider">or</div>

    <a href="/register/" class="register-cta">
      <div class="cta-icon">➕</div>
      <div class="cta-text">
        <strong>Create a new account</strong>
        <span>Register a new portal user</span>
      </div>
      <span class="cta-arrow">›</span>
    </a>

    <div class="hint-strip">
      Default credentials — Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong>
    </div>
  </div>

  <div class="api-note">
    <span class="dot"></span>
    Connected to FastAPI on port 8000
  </div>

</div>
</body>
</html>
